name: shouleme
description: 瘦了么 - BMI体重监测APP
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # 本地存储
  shared_preferences: ^2.2.2
  
  # 折线图
  fl_chart: ^0.65.0
  
  # 应用内购买
  in_app_purchase: ^3.1.10
  
  # 本地通知
  flutter_local_notifications: ^16.3.0
  
  # 图片选择器
  image_picker: ^1.0.4
  
  # CSV导出
  csv: ^5.0.2
  
  # 权限处理
  permission_handler: ^11.0.1
  
  # 路径处理
  path_provider: ^2.1.1
  
  # 时区处理（用于本地通知）
  timezone: ^0.9.2
  
  # UI组件
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/